<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Return Boarding Pass</title>
<style>
    /* CSS เหมือนกับตัวบนเป๊ะครับ เพื่อประหยัดพื้นที่ผมขอสรุปส่วนสำคัญที่เปลี่ยนด้านล่างครับ */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #eef2f6; display: flex; justify-content: center; padding: 40px 20px; margin: 0; color: #1a1a1a; }
    .boarding-pass { display: flex; background: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); width: 100%; max-width: 850px; position: relative; overflow: hidden; }
    .boarding-pass::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: #e32526; z-index: 10; }
    .main-section { flex: 1; padding: 32px; display: flex; flex-direction: column; }
    .bp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 2px solid #f0f0f0; }
    .airline-logo { color: #e32526; font-size: 32px; font-weight: 800; font-style: italic; letter-spacing: -1px; line-height: 1; }
    .bp-title { font-size: 14px; font-weight: 700; color: #888; letter-spacing: 2px; }
    .passenger-name { margin-bottom: 20px; }
    .label { font-size: 10px; text-transform: uppercase; color: #888; letter-spacing: 1px; margin-bottom: 4px; display: block; }
    .value.name { font-size: 18px; font-weight: 700; color: #1a1a1a; text-transform: uppercase; }
    .route-section { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; background: #fdfdfd; padding: 16px 24px; border-radius: 12px; border: 1px solid #f0f0f0; }
    .city { display: flex; flex-direction: column; width: 120px; }
    .city.right { text-align: right; }
    .airport-code { font-size: 42px; font-weight: 800; color: #1a1a1a; line-height: 1; margin-bottom: 4px; }
    .airport-name { font-size: 12px; color: #666; font-weight: 500; }
    .flight-icon { color: #e32526; display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
    .flight-icon svg { width: 32px; height: 32px; fill: currentColor; }
    .flight-line { height: 2px; width: 100%; background: repeating-linear-gradient(90deg, #e32526, #e32526 4px, transparent 4px, transparent 8px); }
    .details-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
    .value { font-size: 15px; font-weight: 700; color: #1a1a1a; }
    .value.highlight { color: #e32526; }
    .stub-section { width: 220px; background: #fcfcfc; padding: 32px 20px; display: flex; flex-direction: column; position: relative; border-left: 2px dashed #d1d5db; }
    .stub-section::before, .stub-section::after { content: ''; position: absolute; left: -17px; width: 32px; height: 32px; background-color: #eef2f6; border-radius: 50%; }
    .stub-section::before { top: -16px; }
    .stub-section::after { bottom: -16px; }
    .stub-header { font-size: 18px; font-weight: 800; color: #1a1a1a; margin-bottom: 20px; text-align: right; }
    .stub-route { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; font-weight: 700; font-size: 18px; }
    .stub-route svg { width: 14px; height: 14px; fill: #888; }
    .stub-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: auto; }
    .barcode { height: 45px; width: 100%; background: repeating-linear-gradient(90deg, #1a1a1a, #1a1a1a 2px, transparent 2px, transparent 4px, #1a1a1a 4px, #1a1a1a 8px, transparent 8px, transparent 10px); margin-top: 20px; opacity: 0.8; }
</style>
</head>
<body>
    <div class="boarding-pass">
        <div class="main-section">
            <div class="bp-header">
                <div class="airline-logo">AirAsia</div>
                <div class="bp-title">BOARDING PASS</div>
            </div>
            <div class="passenger-name">
                <span class="label">Name of Passenger</span>
                <span class="value name">AEKKARAT / ARPSUWAN</span>
            </div>
            <div class="route-section">
                <div class="city">
                    <span class="airport-code">SIN</span>
                    <span class="airport-name">Singapore (T4)</span>
                </div>
                <div class="flight-icon">
                    <svg viewBox="0 0 24 24"><path d="M22.07,9.64C21.86,8.84 21.03,8.36 20.23,8.58L14.92,10L8,3.57L6.09,4.08L10.23,11.25L5.26,12.58L3.29,11.04L1.84,11.43L3.66,14.59L21.43,10.74C22.23,10.53 22.27,10.43 22.07,9.64Z"/></svg>
                    <div class="flight-line"></div>
                </div>
                <div class="city right">
                    <span class="airport-code">DMK</span>
                    <span class="airport-name">Don Mueang (T1)</span>
                </div>
            </div>
            <div class="details-grid">
                <div><span class="label">Flight</span><span class="value">FD 356</span></div>
                <div><span class="label">Date</span><span class="value">26 Apr 2026</span></div>
                <div><span class="label">Boarding</span><span class="value highlight">14:40</span></div>
                <div><span class="label">Arrival</span><span class="value">16:20</span></div>
                <div><span class="label">Gate/Seat</span><span class="value">- / -</span></div>
            </div>
        </div>
        <div class="stub-section">
            <div class="stub-header">FD 356</div>
            <div class="stub-route"><span>SIN</span><svg viewBox="0 0 24 24"><path d="M22.07,9.64L3.66,14.59"/></svg><span>DMK</span></div>
            <div class="stub-details">
                <div><span class="label">Date</span><span class="value">26 Apr</span></div>
                <div><span class="label">Time</span><span class="value">14:40</span></div>
                <div><span class="label">Arrival</span><span class="value">16:20</span></div>
                <div><span class="label">Seat</span><span class="value">-</span></div>
            </div>
            <div class="barcode"></div>
        </div>
    </div>
</body>
</html>
